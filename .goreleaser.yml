version: 2

project_name: skit

builds:
  - id: skit
    main: ./cmd/skit
    binary: skit
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/vlln/skit/internal/cli.version={{ .Version }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - skit
    name_template: >-
      {{ .ProjectName }}_
      {{- if eq .Os "darwin" }}Darwin{{ else if eq .Os "linux" }}Linux{{ else if eq .Os "windows" }}Windows{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: skit
    ids:
      - default
    binaries:
      - skit
    repository:
      owner: vlln
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/vlln/skit"
    description: "Small, reproducible Skill manager for agent ecosystems"
    license: "MIT"

changelog:
  use: git
  sort: asc
